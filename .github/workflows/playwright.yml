name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # 1. Entrar a la carpeta y instalar dependencias
    - name: Install dependencies
      run: npm ci
      working-directory: ./automation-testing

    # 2. Instalar los navegadores de Playwright
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: ./automation-testing

    # 3. Ejecutar los tests
    - name: Run Playwright tests
      run: npx playwright test
      working-directory: ./automation-testing

    # 4. Guardar el reporte (importante para tu portafolio)
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: automation-testing/playwright-report/
        retention-days: 30
